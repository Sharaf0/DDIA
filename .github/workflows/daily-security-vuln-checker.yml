name: Daily Security Vulnerability Checker 🔒

on:
  schedule:
    - cron: '0 9 * * 1-5'  # 9 AM UTC, weekdays only
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read
  security-events: read

jobs:
  scan-vulnerabilities:
    name: Scan and Report Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch CodeQL and Dependabot alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/gh-aw/data
          
          # Fetch CodeQL code scanning alerts
          echo "Fetching CodeQL alerts..."
          gh code-scanning list --state open --format json > /tmp/gh-aw/data/codeql-alerts.json 2>/dev/null || echo '[]' > /tmp/gh-aw/data/codeql-alerts.json
          
          # Fetch Dependabot alerts
          echo "Fetching Dependabot alerts..."
          gh dependabot list --state open --format json > /tmp/gh-aw/data/dependabot-alerts.json 2>/dev/null || echo '[]' > /tmp/gh-aw/data/dependabot-alerts.json
          
          # Fetch existing open issues with security/vulnerability labels
          echo "Fetching existing vulnerability issues..."
          gh issue list --state open --label "security,vulnerability" --format json --limit 100 > /tmp/gh-aw/data/existing-issues.json 2>/dev/null || echo '[]' > /tmp/gh-aw/data/existing-issues.json
          
          # Fetch all open issues for comprehensive deduplication
          echo "Fetching all open issues for deduplication..."
          gh issue list --state open --format json --limit 200 > /tmp/gh-aw/data/all-open-issues.json 2>/dev/null || echo '[]' > /tmp/gh-aw/data/all-open-issues.json

      - name: Run vulnerability triage agent
        uses: github/gh-aw@v1
        with:
          prompt: |
            You are a security vulnerability management AI agent. Your responsibilities:

            **PHASE 1: Parse Alerts**
            1. Read `/tmp/gh-aw/data/codeql-alerts.json` (CodeQL code scanning alerts)
            2. Read `/tmp/gh-aw/data/dependabot-alerts.json` (Dependabot alerts)
            3. Read `/tmp/gh-aw/data/all-open-issues.json` (existing issues for deduplication)

            **PHASE 2: Deduplicate**
            For each vulnerability, check if an issue already exists by matching:
            - For Dependabot: Package name + package version + CVE/Advisory ID
            - For CodeQL: Rule ID + severity + file path
            If a match is found, skip creating a new issue (avoid duplicates).

            **PHASE 3: Create New Issues**
            For each NEW vulnerability (not found in existing issues):
            
            Issue Title Format:
            `[SEVERITY] Package vulnerability: CVE-XXXX` (Dependabot)
            `[SEVERITY] Code scanning: Rule name` (CodeQL)
            
            Issue Body should include:
            - Vulnerability type (CodeQL rule or Dependabot advisory)
            - Severity level
            - Affected component (package name/version or file path)
            - Description of the issue
            - Recommended fix/remediation steps
            - Links to advisory/documentation if available
            
            Labels to add:
            - Always: `security`, `vulnerability`
            - Based on severity: `critical`, `high`, `medium`, or `low`
            - Source: `codeql` or `dependabot`
            
            Use safe output `create-issue` for each new vulnerability.

            **PHASE 4: Add Comments with Remediation**
            For each newly created issue, add a detailed comment with:
            - Step-by-step remediation instructions
            - Recommended version upgrade (if applicable)
            - Timeline for fixing (critical = ASAP, high = 1 week, medium = 2 weeks)
            
            Use safe output `add-comment` with detailed fix recommendations.

            **PHASE 5: Close Resolved Vulnerabilities**
            Check existing open vulnerability issues: if an issue is no longer in the current alerts data,
            it means the vulnerability has been resolved. Close it with a message:
            "✅ This vulnerability has been resolved in the latest code. Closing this issue."
            
            Use safe output `close-issue`.

            **PHASE 6: Summary**
            - If vulnerabilities were found and created: provide a count summary
            - If no new vulnerabilities: Call `noop` with reason: "No new vulnerabilities detected. All systems secure."
            - If vulnerabilities were resolved: mention which issues were closed

            **IMPORTANT RULES:**
            - Always avoid duplicate issue creation - check existing issues first
            - Every write action must use safe outputs (create-issue, add-comment, close-issue)
            - If no action needed (no new vulns, nothing to close), call `noop`
            - Make issue body clear and actionable for developers
            - Prioritize critical and high-severity vulnerabilities in comments
          
          tools: |
            - create-issue
            - add-comment
            - add-labels
            - close-issue
            - noop

      - name: Post all-clear notification (if no vulnerabilities)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if there were any alerts
          codeql_count=$(jq 'length' /tmp/gh-aw/data/codeql-alerts.json 2>/dev/null || echo 0)
          dependabot_count=$(jq 'length' /tmp/gh-aw/data/dependabot-alerts.json 2>/dev/null || echo 0)
          
          if [ "$codeql_count" -eq 0 ] && [ "$dependabot_count" -eq 0 ]; then
            echo "✅ Security Scan Complete: No vulnerabilities detected"
            echo "CodeQL alerts: $codeql_count"
            echo "Dependabot alerts: $dependabot_count"
          fi
